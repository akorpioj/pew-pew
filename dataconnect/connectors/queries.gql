# Fetch the full category tree, starting from root categories (no parent).
# Returns up to 4 levels deep. Client reconstructs the tree from nested data.
query GetCategoryTree @auth(level: USER_EMAIL_VERIFIED) {
  categories(
    where: { parentId: { isNull: true } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    description
    children: categories_on_parent(orderBy: [{ name: ASC }]) {
      id
      name
      description
      children: categories_on_parent(orderBy: [{ name: ASC }]) {
        id
        name
        description
        children: categories_on_parent(orderBy: [{ name: ASC }]) {
          id
          name
          description
        }
      }
    }
  }
}

# Fetch all articles in a given category (shallow — no subtree).
query GetArticlesByCategory($categoryId: UUID!) @auth(level: USER_EMAIL_VERIFIED) {
  articles(
    where: { categoryId: { eq: $categoryId } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    title
    slug
    isPublished
    createdAt
    author { id email }
  }
}

# Fetch a single article by slug, including full content.
query GetArticleBySlug($slug: String!) @auth(level: USER_EMAIL_VERIFIED) {
  article(first: { where: { slug: { eq: $slug } } }) {
    id
    title
    slug
    content
    isPublished
    createdAt
    category { id name }
    author { id email }
  }
}

# Fetch all revisions for a given article, newest first.
# Used by the "Version History" slide-out (B30).
query GetRevisionsByArticle($articleId: UUID!) @auth(level: USER_EMAIL_VERIFIED) {
  revisions(
    where: { articleId: { eq: $articleId } }
    orderBy: [{ savedAt: DESC }]
  ) {
    id
    savedAt
    savedBy { id email }
  }
}

# NOTE: SearchWiki (vector similarity) is intentionally absent from this
# client connector. The Vector input type cannot be serialised by the client
# SDK. Similarity search is performed server-side inside the Cloud Function
# ragAnswer flow (B15-B18) via the Admin SDK executeGraphqlRead API.
